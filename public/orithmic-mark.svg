<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="orithmic-g" x1="4" y1="6" x2="36" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5eead4" />
      <stop offset="100%" stop-color="#c4b5fd" />
    </linearGradient>
  </defs>
  <rect width="40" height="40" rx="9" fill="#09090b" />
  <!-- Three arcs = rhythm / path segments forming a ring -->
  <circle
    cx="20"
    cy="20"
    r="11.5"
    fill="none"
    stroke="url(#orithmic-g)"
    stroke-width="3.25"
    stroke-linecap="round"
    stroke-dasharray="22.15 2.05"
    transform="rotate(-90 20 20)"
  />
</svg>
